<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Numen</title>
    <meta
      name="description"
      content="Static-first academic writing platform for drafting, citations, literature review, figures, and submission-ready PDFs."
    />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8f4;
        color: #17201b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(900px, 100%);
      }
      h1 {
        font-size: clamp(2.4rem, 7vw, 5.8rem);
        line-height: 0.95;
        margin: 0 0 16px;
      }
      p {
        max-width: 720px;
        font-size: 1.12rem;
        line-height: 1.6;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }
      a {
        color: #0b5f6a;
        font-weight: 700;
      }
      .links a {
        border: 1px solid #b7cbc3;
        border-radius: 8px;
        padding: 10px 14px;
        text-decoration: none;
        background: #ffffff;
      }
      footer {
        color: #51615b;
        margin-top: 36px;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Numen</h1>
      <p>
        A GitHub Pages-first academic writing and research platform is being assembled here: drafts,
        citations, literature review, figures, static paper caches, and local-first export tools.
      </p>
      <div class="links">
        <a href="https://github.com/baditaflorin/numen">Star the repository</a>
        <a href="https://www.paypal.com/paypalme/florinbadita">Support via PayPal</a>
      </div>
      <footer>Mode B: static runtime, pre-built data artifacts. Version: scaffold.</footer>
    </main>
  </body>
</html>
